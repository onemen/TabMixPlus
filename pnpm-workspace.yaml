autoInstallPeers: true
saveExact: true
minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  - 'typescript'
  - 'typescript-eslint'
  - '@typescript-eslint/*'
  - '@typescript/native-preview*'

overrides:
  'brace-expansion@5.0.5': '>=5.0.6'
  fast-uri: '3.1.2'
  js-yaml: '>=4.1.2'

trustPolicy: no-downgrade
